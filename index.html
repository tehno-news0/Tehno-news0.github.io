<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tehno News — Главная</title>
    <!-- Эту строку можно удалить, если не подтверждаешь сайт в Яндексе -->
    <meta name="yandex-verification" content="d7a8c08cc847c459" />

    <style>
      /* --- БАЗОВЫЕ НАСТРОЙКИ --- */
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: Arial, sans-serif;
        background-color: #0f1115;
        background-image: url('https://images.unsplash.com/photo-1519681393784-d120267933ba?q=80&w=2070&auto=format&fit=crop');
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        color: #fff;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      /* --- ПРИВЕТСТВЕННЫЙ ЭКРАН (АНИМАЦИЯ) --- */
      .overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: #000; z-index: 9999;
        display: flex; justify-content: center; align-items: center;
        transition: opacity 1s ease-out;
      }
      .welcome-text {
        color: #fff; font-size: 3rem; text-align: center;
        transform: translateY(40px); opacity: 0;
        transition: transform 1.2s cubic-bezier(0.25, 1, 0.5, 1), opacity 1.2s ease-out;
      }

      /* --- ОСНОВНОЙ КОНТЕНТ --- */
      .container {
        width: 100%;
        max-width: 1100px;
        margin: 0 auto;
        padding: 40px 20px;
        flex: 1; /* Прижимает футер вниз */
      }

      h1 {
        text-align: center;
        margin-bottom: 40px;
        text-shadow: 0 2px 6px rgba(0,0,0,0.7);
        font-size: 2.5rem;
      }

      /* --- СЕТКА НОВОСТЕЙ (КАРТИНКИ) --- */
      .news-grid {
        display: grid;
        /* Адаптивная сетка: карточки сами подстраиваются */
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 30px;
      }

      .news-card {
        background: rgba(0, 0, 0, 0.75);
        border-radius: 12px;
        padding: 25px;
        border: 1px solid rgba(255,255,255,0.1);
        backdrop-filter: blur(10px);
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        min-height: 280px;
        transition: transform 0.3s, box-shadow 0.3s;
      }
      .news-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      }

      .news-card h3 {
        margin-bottom: 15px;
        color: #cfa32a; /* Цвет заголовка как у кнопок */
        font-size: 1.4rem;
      }
      .news-card p {
        color: #ddd;
        line-height: 1.6;
        margin-bottom: 25px;
        flex: 1; /* Растягивает текст, чтобы кнопка была внизу */
      }

      /* --- КНОПКА "ЧИТАТЬ ДАЛЬШЕ" --- */
      .btn-read-more {
        display: block;
        width: 100%;
        padding: 14px;
        background: #cfa32a;
        color: #222;
        text-decoration: none;
        border-radius: 6px;
        font-weight: bold;
        text-align: center;
        transition: background 0.3s, transform 0.2s;
      }
      .btn-read-more:hover {
        background: #e6b833;
        transform: scale(1.02);
      }

      /* --- ПАНЕЛЬ ДОБАВЛЕНИЯ (НИЗ СТРАНИЦЫ) --- */
      .admin-panel {
        background: rgba(0, 0, 0, 0.85);
        padding: 25px;
        border-radius: 12px;
        margin-top: 40px;
        border: 1px solid rgba(255,255,255,0.1);
        box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
      }
      .admin-panel h2 {
        margin-bottom: 15px;
        color: #cfa32a;
        font-size: 1.2rem;
      }
      .admin-input-group {
        display: flex;
        gap: 15px;
        flex-wrap: wrap;
        align-items: flex-end;
      }
      .admin-input-group input,
      .admin-input-group textarea {
        flex: 1;
        min-width: 200px;
        padding: 12px;
        border-radius: 6px;
        border: 1px solid #555;
        background: rgba(255,255,255,0.95);
        color: #333;
        font-size: 1rem;
      }
      .admin-input-group textarea {
        resize: vertical;
        height: 60px;
      }
      .admin-input-group button {
        padding: 12px 24px;
        background: #cfa32a;
        border: none;
        border-radius: 6px;
        color: #222;
        font-weight: bold;
        cursor: pointer;
        transition: background 0.3s;
      }
      .admin-input-group button:hover {
        background: #e6b833;
      }

      footer {
        text-align: center;
        padding: 20px;
        color: #777;
        font-size: 0.9rem;
        margin-top: auto;
      }
    </style>
  </head>
  <body>

    <!-- Приветствие -->
    <div class="overlay" id="overlay">
      <div class="welcome-text" id="welcome">Добро пожаловать на Tehno News</div>
    </div>

    <div class="container">
      <h1>Последние новости и статьи</h1>

      <!-- Сюда JavaScript добавит карточки -->
      <div class="news-grid" id="newsGrid">
        <!-- Карточки появятся здесь -->
      </div>
    </div>

    <!-- Панель добавления новости (только для тебя внизу) -->
    <div class="admin-panel">
      <h2>📝 Добавить новую новость (Админ-панель)</h2>
      <div class="admin-input-group">
        <input type="text" id="newsTitle" placeholder="Заголовок новости (например: ИИ в бизнесе)" />
        <textarea id="newsText" rows="2" placeholder="Короткий анонс (50-100 символов)"></textarea>
        <button id="addNewsBtn">Опубликовать</button>
      </div>
      <p style="margin-top: 10px; font-size: 0.8rem; color: #888;">
        После публикации карточка появится в сетке выше. Кнопка "Читать дальше" ведет на страницу news.html.
      </p>
    </div>

    <footer>
      &copy; 2026 Tehno News. Все права защищены.
    </footer>

    <script>
      // 1. Анимация приветствия
      setTimeout(() => {
        const welcome = document.getElementById('welcome');
        const overlay = document.getElementById('overlay');
        welcome.style.transform = 'translateY(0)';
        welcome.style.opacity = '1';
        setTimeout(() => {
          overlay.style.opacity = '0';
          setTimeout(() => { overlay.style.display = 'none'; }, 1000);
        }, 2000);
      }, 500);

      // 2. Элементы управления
      const grid = document.getElementById('newsGrid');
      const titleInput = document.getElementById('newsTitle');
      const textInput = document.getElementById('newsText');
      const addBtn = document.getElementById('addNewsBtn');

      // 3. Функция отрисовки новостей
      function renderNews() {
        // Берем данные из памяти браузера
        const items = JSON.parse(localStorage.getItem('tehnoNews') || '[]');
        grid.innerHTML = '';

        // Показываем сначала новые (переворачиваем массив)
        items.reverse().forEach(item => {
          const card = document.createElement('div');
          card.className = 'news-card';
          
          // ВАЖНО: Ссылка href="news.html" ведет на твою страницу с полной статьей.
          // Если хочешь вести на помощь бизнесу, замени на href="business-help.html"
          card.innerHTML = `
            <div>
              <h3>\${escapeHtml(item.title)}</h3>
              <p>\${escapeHtml(item.text)}</p>
            </div>
            <a href="news.html" class="btn-read-more">Читать дальше →</a>
          `;
          grid.appendChild(card);
        });
      }

      // 4. Логика добавления новости
      addBtn.addEventListener('click', () => {
        const title = titleInput.value.trim();
        const text = textInput.value.trim();
        
        if (!title || !text) {
          return alert('Пожалуйста, заполните и заголовок, и текст анонса!');
        }

        const items = JSON.parse(localStorage.getItem('tehnoNews') || '[]');
        const now = new Date();
        const dateStr = now.toLocaleString('ru-RU', {
          day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit'
        });

        // Добавляем новую новость
        items.push({ title, text, date: dateStr });
        
        // Сохраняем в браузер
        localStorage.setItem('tehnoNews', JSON.stringify(items));

        // Очищаем поля и обновляем список
        titleInput.value = '';
        textInput.value = '';
        renderNews();
      });

      // 5. Защита от взлома (чтобы нельзя было вставить скрипт вместо текста)
      function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
      }

      // Запуск при загрузке страницы
      renderNews();
    </script>
  </body>
</html>
