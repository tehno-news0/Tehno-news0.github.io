    <style>
      /* Базовые настройки */
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { 
        font-family: Arial, sans-serif; 
        margin: 0; 
        padding: 0;
        background-color: #f4f4f4;
        min-height: 100vh;
        overflow-x: hidden; /* Убирает горизонтальную прокрутку при анимации */
      }

      /* Экран загрузки (Overlay) */
      .overlay {
        position: fixed; 
        top: 0; left: 0; width: 100%; height: 100%;
        background: #000; 
        z-index: 9999;
        
        /* ГЛАВНОЕ: Центрируем и по горизонтали, и по вертикали */
        display: flex; 
        justify-content: center; 
        align-items: center; 
        
        transition: opacity 0.5s ease-out;
      }
      
      .welcome-text {
        color: #fff; 
        font-size: 3rem;
        text-align: center; 
        padding: 20px;
        
        /* Начальная позиция: чуть ниже центра и прозрачный */
        transform: translateY(50px); 
        opacity: 0;
        
        /* Ускоряем анимацию появления текста до 1 секунды */
        transition: transform 1s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 1s ease-out;
      }

      /* Основной контент */
      .page-wrapper {
        width: 100%;
        background-image: url('https://images.unsplash.com/photo-1542359374-6ba6124bf90b?ixlib=rb-1.2.1&auto=format&fit=crop&w=1920&q=80');
        background-size: cover; 
        background-position: center;
        filter: brightness(0.4); 
        display: flex; 
        flex-direction: column; 
        align-items: center;
        padding-top: 80px;
        padding-bottom: 50px;
      }

      h1 {
        color: #fff; 
        text-shadow: 0 2px 6px rgba(0,0,0,0.7);
        font-size: 3rem;
        margin-bottom: 10px;
      }

      p.subtitle {
        color: #ddd; 
        margin-top: 10px;
        font-size: 1.2rem;
      }

      .buttons-container { 
        display: flex; 
        gap: 20px; 
        margin-top: 40px; 
        flex-wrap: wrap;
        justify-content: center;
      }

      .nav-btn {
        padding: 15px 30px; 
        font-size: 1rem; 
        cursor: pointer; 
        text-decoration: none;
        border: none;
        background: rgba(255, 255, 255, 0.9); 
        color: #333; 
        border-radius: 6px;
        font-weight: bold;
        transition: background 0.3s, transform 0.2s;
        display: inline-block;
      }

      .nav-btn:hover { 
        background: #fff; 
        transform: scale(1.05);
        box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      }

      footer {
        text-align: center;
        padding: 20px;
        color: #777;
        font-size: 0.9rem;
        width: 100%;
      }
    </style>
  </head>

      </div>
    </div>

    </footer>
