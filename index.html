<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Techno News — Главная</title>
    <meta name="yandex-verification" content="ada1234fndn" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { margin: 0; overflow: hidden; }
      .overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: #000; z-index: 9999;
        display: flex; justify-content: center; align-items: flex-end;
      }
      .welcome-text {
        color: #fff; font-family: Arial, sans-serif; font-size: 3rem;
        text-align: center; padding: 20px;
        transform: translateY(100px); opacity: 0;
        transition: transform 2s ease-out, opacity 2s ease-out;
      }
      .page-content {
        width: 100vw; height: 100vh;
        background-image: url('https://images.unsplash.com/photo-1542359374-6ba6124bf90b?ixlib=rb-1.2.1&auto=format&fit=crop&w=1920&q=80');
        background-size: cover; background-position: center;
        filter: brightness(0.3); transition: filter 2s ease-out;
        display: flex; flex-direction: column; justify-content: center; align-items: center;
      }
      .buttons-container { display: flex; gap: 20px; margin-top: 40px; }
      button {
        padding: 12px 24px; font-size: 1rem; cursor: pointer; border: none;
        background: rgba(255, 255, 255, 0.9); color: #333; border-radius: 6px;
      }
      button:hover { background: #fff; }
    </style>
  </head>
  <body>
    <div class="overlay" id="overlay">
      <div class="welcome-text" id="welcome">Добро пожаловать на Techno News</div>
    </div>

    <div class="page-content" id="page">
      <h1 style="color:#fff; text-shadow:0 2px 6px rgba(0,0,0,0.7);">Techno News</h1>
      <p style="color:#ddd; margin-top:10px;">Свежие новости, аналитика, финансы</p>

      <div class="buttons-container">
        <a href="news.html"><button>Новости</button></a>
        <a href="market.html"><button>Рынок валют и акции</button></a>
        <a href="business-help.html"><button>Помощь бизнесу</button></a>
      </div>
    </div>

    <script>
      setTimeout(() => {
        const welcome = document.getElementById('welcome');
        const page = document.getElementById('page');
        const overlay = document.getElementById('overlay');

        welcome.style.transform = 'translateY(0)';
        welcome.style.opacity = '1';
        page.style.filter = 'brightness(1)';

        setTimeout(() => { overlay.style.display = 'none'; }, 2000);
      }, 500);
    </script>
  </body>
</html>
